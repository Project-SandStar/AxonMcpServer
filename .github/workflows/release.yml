name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # 1) release-please keeps a "release PR" open that bumps the version in
  #    package.json + writes CHANGELOG.md from Conventional Commits. Merging that
  #    PR creates the git tag and the GitHub Release.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # 2) Only when a release was just created: build, zip the runnable bundle, and
  #    attach it to the GitHub Release as a downloadable asset.
  package:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

      - name: Assemble release bundle
        run: |
          PKG="axon-mcp-server-${{ needs.release-please.outputs.tag_name }}"
          mkdir -p "bundle/$PKG/config"
          cp -r dist prisma scripts "bundle/$PKG/"
          cp package.json package-lock.json README.md LICENSE "bundle/$PKG/"
          cp CHANGELOG.md .env.example "bundle/$PKG/" 2>/dev/null || true
          cp config/*.example.json config/README.md "bundle/$PKG/config/" 2>/dev/null || true
          ( cd bundle && zip -r "../$PKG.zip" "$PKG" )
          echo "Built $PKG.zip"

      - name: Attach zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: axon-mcp-server-*.zip
