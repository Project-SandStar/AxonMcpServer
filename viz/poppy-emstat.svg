<svg viewBox="0 0 300 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Poppy EmStat bioaerosol device">
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9ced6"/>
      <stop offset="0.18" stop-color="#f4f6f9"/>
      <stop offset="0.55" stop-color="#e4e8ee"/>
      <stop offset="0.85" stop-color="#c2c8d1"/>
      <stop offset="1" stop-color="#aab1bd"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d3d8df"/>
      <stop offset="0.5" stop-color="#f7f9fb"/>
      <stop offset="1" stop-color="#b9c0ca"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b3340"/>
      <stop offset="1" stop-color="#10151d"/>
    </linearGradient>
    <radialGradient id="uv" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#8fb6ff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#8fb6ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13324a"/>
      <stop offset="1" stop-color="#0a1b29"/>
    </linearGradient>
    <pattern id="perf" width="9" height="9" patternUnits="userSpaceOnUse">
      <circle cx="4.5" cy="4.5" r="1.7" fill="#8b929c"/>
    </pattern>
    <pattern id="vent" width="7" height="7" patternUnits="userSpaceOnUse">
      <circle cx="3.5" cy="3.5" r="1.3" fill="#9aa1ab"/>
    </pattern>
  </defs>

  <!-- shadow -->
  <ellipse cx="150" cy="424" rx="120" ry="10" fill="#000" opacity="0.10"/>

  <!-- casters -->
  <g fill="#3c4049" stroke="#23282f" stroke-width="1">
    <circle cx="78"  cy="410" r="11" fill="#3c4049"/>
    <circle cx="150" cy="416" r="11" fill="#3c4049"/>
    <circle cx="222" cy="410" r="11" fill="#3c4049"/>
    <circle cx="78"  cy="410" r="4.5" fill="#6b7280"/>
    <circle cx="150" cy="416" r="4.5" fill="#6b7280"/>
    <circle cx="222" cy="410" r="4.5" fill="#6b7280"/>
  </g>

  <!-- main body -->
  <rect x="44" y="62" width="212" height="345" rx="26" fill="url(#body)" stroke="#9aa1ab" stroke-width="1.5"/>
  <!-- subtle left highlight seam -->
  <rect x="60" y="78" width="6" height="312" rx="3" fill="#ffffff" opacity="0.45"/>

  <!-- top intake module -->
  <rect x="58" y="36" width="184" height="46" rx="16" fill="url(#top)" stroke="#9aa1ab" stroke-width="1.5"/>
  <rect data-anim="intake" x="92" y="44" width="132" height="30" rx="7" fill="url(#perf)" stroke="#aeb5bf" stroke-width="1"/>
  <rect x="66" y="46" width="20" height="26" rx="5" fill="url(#perf)" opacity="0.85"/>

  <!-- viewing window (sterilization chamber) -->
  <rect x="92" y="104" width="116" height="104" rx="12" fill="url(#glass)" stroke="#8b929c" stroke-width="2"/>
  <rect x="100" y="112" width="100" height="88" rx="8" fill="#0c121a"/>
  <!-- UV / internal element glow -->
  <rect data-anim="uvglow" x="116" y="120" width="68" height="64" rx="6" fill="url(#uv)"/>
  <rect x="126" y="120" width="7" height="66" rx="3.5" fill="#cfe0ff" opacity="0.85"/>
  <rect x="167" y="120" width="7" height="66" rx="3.5" fill="#cfe0ff" opacity="0.85"/>
  <rect x="146" y="124" width="8" height="58" rx="3" fill="#9fb6d8" opacity="0.6"/>

  <!-- touchscreen -->
  <rect x="118" y="220" width="64" height="46" rx="6" fill="#1b2531" stroke="#7c828c" stroke-width="1.5"/>
  <rect data-anim="screen" x="123" y="225" width="54" height="36" rx="4" fill="url(#screen)"/>
  <circle cx="150" cy="231" r="2" fill="#e3534a"/>
  <rect x="129" y="240" width="34" height="3" rx="1.5" fill="#3f7fb0" opacity="0.8"/>
  <rect x="129" y="247" width="26" height="3" rx="1.5" fill="#2f6e93" opacity="0.7"/>
  <rect x="129" y="254" width="40" height="3" rx="1.5" fill="#3f7fb0" opacity="0.6"/>

  <!-- POPPY logo -->
  <g transform="translate(150 312)">
    <g fill="#d9531e">
      <g>
        <ellipse cx="0" cy="-16" rx="7.5" ry="12"/>
        <ellipse cx="0" cy="-16" rx="7.5" ry="12" transform="rotate(45)"/>
        <ellipse cx="0" cy="-16" rx="7.5" ry="12" transform="rotate(90)"/>
        <ellipse cx="0" cy="-16" rx="7.5" ry="12" transform="rotate(135)"/>
        <ellipse cx="0" cy="-16" rx="7.5" ry="12" transform="rotate(180)"/>
        <ellipse cx="0" cy="-16" rx="7.5" ry="12" transform="rotate(225)"/>
        <ellipse cx="0" cy="-16" rx="7.5" ry="12" transform="rotate(270)"/>
        <ellipse cx="0" cy="-16" rx="7.5" ry="12" transform="rotate(315)"/>
      </g>
      <circle cx="0" cy="0" r="9" fill="#ffffff"/>
      <circle cx="0" cy="0" r="5.5" fill="#d9531e"/>
    </g>
    <text x="0" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="2" fill="#d9531e">POPPY</text>
  </g>

  <!-- lower exhaust vents -->
  <rect x="92" y="372" width="116" height="22" rx="6" fill="url(#vent)" stroke="#aeb5bf" stroke-width="1"/>

  <!-- connection status LED (driven by Connected point) -->
  <circle data-anim="status" cx="234" cy="78" r="7" fill="#64748b" stroke="#ffffff" stroke-width="1.5"/>
</svg>
